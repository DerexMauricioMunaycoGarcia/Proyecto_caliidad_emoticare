name: CI/CD Flutter App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    name:  Build Flutter
    runs-on: ubuntu-latest

    steps:
      - name:  Clonar repositorio
        uses: actions/checkout@v3

      - name:  Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Instalar dependencias
        run: flutter pub get

      - name:  Analizar código
        run: flutter analyze || true

  test:
    name: Pruebas unitarias
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable 

      - name: Dependencias
        run: flutter pub get

      - name: Ejecutar tests
        run: flutter test || true

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name:  Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name:  Dependencias
        run: flutter pub get

      - name:  Build Web
        run: flutter build web

  deploy:
    name: Deploy (simulado)
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name:  Despliegue
        run: echo "Deploy realizado correctamente"
